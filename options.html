<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Impulse Lockdown — Control Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #08080c;
      color: #bcbcc4;
      font-family: 'JetBrains Mono', monospace;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }
    .container {
      width: 800px;
      border: 1px solid #222;
      background: #0c0c12;
      padding: 40px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    h1 { color: #ff0055; margin-top: 0; font-size: 2rem; }
    .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
    .card { background: #040406; border: 1px solid #ff0055; padding: 20px; text-align: center; }
    .number { display: block; font-size: 2.5rem; color: #fff; font-weight: bold; margin-bottom: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 SDG 3 INTERVENTION ANALYTICS</h1>
    <p>System configuration status and behavioral metrics logging panel.</p>
    <div class="metric-grid">
      <div class="card">
        <span class="number" style="color: #ff3333;">14</span>
        <span>Impulse Orders Blocked</span>
      </div>
      <div class="card">
        <span class="number" style="color: #00ffcc;">70 min</span>
        <span>Total Mindfulness Delay</span>
      </div>
      <div class="card">
        <span class="number" style="color: #ffaa00;">100%</span>
        <span>Compiler Accuracy</span>
      </div>
    </div>
    <h2>⚙️ Targeted Gateways</h2>
    <ul>
      <li>UberEats Platform Pipeline</li>
      <li>DoorDash Checkout Middleware</li>
      <li>Zomato / Swiggy Network Layer</li>
    </ul>
  </div>
</body>
</html>
